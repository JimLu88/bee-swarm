mode_id: purchase_decision
scenario_description: |
  采购决策场景:汽车/电子大件/家电/办公设备等。产品参数/真实评测/售后/财务/替代 5 向。
  必须挑战"非买不可"的假设, 给出"不买/二手/租赁"的替代方案对比。
default_task_hint: "想买一辆 15-20 万的家用 SUV, 主要城市通勤偶尔自驾游, 油车 vs 纯电选哪个?"
gene_seeds:
  product_specs: "硬件规格 / 工艺质量 / 寿命预期 / 兼容性 / 升级空间。"
  real_reviews: "Top 5 长期使用者真实反馈 / 翻车案例 / 售后投诉热点 / 口碑趋势。"
  after_sales: "保修条款 / 保值率 / 维修便利 / 三年残值预估。"
  fin_planning: "现金 vs 分期 vs 信用卡 / 隐性成本 (保险 / 耗材 / 升级) / TCO 模型。"
  alt_options: "不买/二手/租赁/共享 各场景下的可行性和成本对比。"
  benchmark: "同价位竞品横评 / 海外版差异 / 国货 vs 进口 选择标准。"
  xlab: "用户买这个东西要解决什么真正的问题? 也许根本不需要买。"
