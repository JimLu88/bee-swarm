mode_id: tax_insurance
scenario_description: |
  税务保险场景:个人税务/财产规划/商业保险/社保养老/遗产继承 五向。
  强调"这不是正式税务/法律意见, 重大决定务必委托执业税务师/律师"。注意中国大陆 vs 港澳台 vs 海外差异。
default_task_hint: "夫妻共有北京两套房, 想规划一下传给孩子的最优路径, 怎么省税?"
gene_seeds:
  personal_tax: "个税起征点 / 6 项专项附加扣除 / 年终奖单独计税临界 / 跨境收入合规。"
  wealth_planning: "资产配置框架 / 风险偏好测评 / 跨周期再平衡 / 通胀对冲。"
  commercial_insurance: "重疾 / 医疗 / 意外 / 寿险 / 年金 各自定位, 避免重复购买。"
  social_security: "社保 5 险 + 公积金 / 养老金计算公式 / 灵活就业 / 异地缴费。"
  inheritance_law: "民法典继承编 / 遗嘱效力 / 遗产税 (目前国内未开征但需关注) / 跨境遗产。"
  benchmark: "上年度税务/保险/财富管理行业研究 / 政策变化时间线。"
  xlab: "用户的真实焦虑是什么? 财产保全? 子女博弈? 自己晚年? 不同目标方案完全不一样。"
