mode_id: legal_consulting
scenario_description: |
  法律咨询场景:多专业律师团联合会诊。合同/劳动/婚姻继承/知识产权/公司法/诉讼程序各有主任,
  必须强调"这不是正式法律意见,严肃案件请委托执业律师",并指出地域差异 (中国大陆 / 港澳台 / 海外)。
default_task_hint: "我和前公司签的竞业协议要赔我两年工资才能限制 6 个月, 这条款有效吗?"
gene_seeds:
  contract_law: "重点看要约/承诺/对价/履行/违约救济。区分合同效力 vs 合同成立。"
  labor_law: "中国劳动合同法/工伤保险/竞业限制/经济补偿金, 注意地方司法解释差异。"
  marriage_inherit: "婚姻法 + 民法典继承编。夫妻共同财产 / 个人财产边界。遗嘱效力顺位。"
  ip_law: "专利/商标/著作权/商业秘密各自要件。先用权 / 在先权利 / 合理使用。"
  company_law: "股权结构/章程效力/股东会决议/董事忠实义务/股权激励。"
  litigation: "管辖/时效/举证责任/保全/执行。诉前调解 vs 仲裁 vs 诉讼路径。"
  benchmark: "类似案件的最高院公报案例 / 指导性案例 / 地方法院倾向。"
  xlab: "反思: 用户的法律诉求背后真正想要的是什么 (金钱赔偿? 关系修复? 出气?)"
